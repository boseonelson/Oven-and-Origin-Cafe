<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Oven and Origin Cafe</title>
    <link rel="stylesheet" href="log in.css">
</head>
<body>

    <header class="header">
        <div class="logo">
        <img src="logo.png" alt="Logo">
            Oven and Origin Cafe
        </div>

        <nav class="nav">
            <a href="General View.html">Home</a>
        </nav>
    </header>

    <section class="hero">
        <div class="overlay"></div>

            <div class="hero-content">
                <div class="login-card">
                    <div class="container">
                        <img src="brandlogo.jpg" alt="logo" class="brand">
                        <h1>Oven and <span>Origin Cafe</span></h1>
                        <p>Welcome to our shop! We hope you and your furry friends enjoy your stay. 🐾
                    </div>

 
                    <form action="#" method="GET">
                        <div class="input-group">
                            <input type="email" id="email" required placeholder=" ">
                            <label for="email">Email Address</label>
                        </div>
                
                        <div class="input-group">
                            <input type="password" id="password" required placeholder=" ">
                            <label for="password">Password</label>
                        </div>

                        <button type="submit" class="login-btn">Sign In</button>
                  
                        <div class="footer-links">
                            <span>New Here? ☕<a href="#" class="signup">Sign up</a></span>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
